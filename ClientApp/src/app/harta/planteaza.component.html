<!--cruce-buto... nu mai e cruce-->
<button *ngIf="sod=='dreptaci'" class="planteaza-mare-sting" (click)="onApasat()" [routerLink]="['']" style="padding: 0; margin: 0; ">
  <!--margin zero nu face nimic da mai bine rămîne-->
  <img *ngIf="roc=='radacina'" id="img-mare-sting" src="/assets/img/radacina-buton-mare-sting.svg" alt="buton vezi harta">
  <img *ngIf="roc=='cruce'" id="img-mare-sting" src="/assets/img/cruce-buton-mare-sting.svg" alt="buton plantează un copac">
</button>
<button *ngIf="sod=='dreptaci'" class="planteaza-mic-drept" (click)="onApasat()" [routerLink]="['']" style="padding: 0; margin: 0; ">
  <img *ngIf="roc=='radacina'" id="img-mic-drept" src="/assets/img/radacina-buton-mic-drept.svg" alt="buton vezi harta">
  <img *ngIf="roc=='cruce'" id="img-mic-drept" src="/assets/img/cruce-buton-mic-drept.svg" alt="buton plantează un copac">
</button>

<button *ngIf="sod=='stîngaci'" class="planteaza-mare-drept" (click)="onApasat()" [routerLink]="['']" style="padding: 0; margin: 0; ">
  <img *ngIf="roc=='radacina'" id="img-mare-drept" src="/assets/img/radacina-buton-mare-drept.svg" alt="buton vezi harta">
  <img *ngIf="roc=='cruce'" id="img-mare-drept" src="/assets/img/cruce-buton-mare-drept.svg" alt="buton plantează un copac">
</button>
<button *ngIf="sod=='stîngaci'" class="planteaza-mic-sting" (click)="onApasat()" [routerLink]="['']" style="padding:0; margin:0;">
  <img *ngIf="roc=='radacina'" id="img-mic-sting" src="/assets/img/radacina-buton-mic-sting.svg" alt="buton vezi harta">
  <img *ngIf="roc=='cruce'" id="img-mic-sting" src="/assets/img/cruce-buton-mic-sting.svg" alt="buton plantează un copac">
</button>

<div id="liveToast" class="toast position-fixed bottom-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5555"
  style="z-index: 11; white-space: pre-line; text-align: center; left: 50%; transform: translate(-50%,-24mm); height: 12mm; width: 64mm; border-radius: 12mm; border-top-left-radius: 12mm; border-top-right-radius: 12mm; background-color: var(--culoare-butoane); box-shadow: 0 0 3mm grey;"><!--ar fi fain să-l fac cu colțuri drepte jos și rotunjite sus și să-l arăt jos la mobil iar la desktop cu colțuri drepte sus și rotunjite jos și să-l arăt sus-->
  {{mesajRaspunsCopac}}
</div>
